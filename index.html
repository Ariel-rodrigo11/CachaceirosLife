<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta das Bebidas</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  background: #1a1a2e;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow-x: hidden;
}
canvas#bg {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

/* slime at top */
#slime-wrap {
  display: none;
  position: fixed; top: 0; left: 0;
  width: 100%; z-index: 15;
  pointer-events: none;
  transform: translateY(-100%);
  transition: none;
}
#slime-wrap.show {
  animation: slime-drip 1s cubic-bezier(0.22,1,0.36,1) forwards;
}
#slime-img { width: 100%; display: block; }

/* skull — bottom right corner, never overlaps center content */
#skull-wrap {
  display: none;
  position: fixed;
  bottom: 0; right: 0;
  z-index: 20;
  width: 160px;
  transform: translateY(200px) rotate(15deg);
  opacity: 0;
}
#skull-wrap.show {
  animation: skull-slide-in 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
}
#skull-wrap.wobble {
  animation: skull-wobble 1.4s ease-in-out infinite;
}
#skull-img {
  width: 160px;
  filter: drop-shadow(0 0 18px #ff003c) drop-shadow(0 0 40px #ff003c88);
}

.app {
  position: relative; z-index: 2;
  width: 100%; max-width: 580px;
  padding: 2rem 1.5rem 3rem;
}

h1 {
  text-align: center; font-size: 2rem; font-weight: 700;
  color: #fff; margin-bottom: 0.3rem;
}
.sub {
  text-align: center; font-size: 14px;
  color: rgba(255,255,255,0.5); margin-bottom: 1.8rem;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 8px; margin-bottom: 1.4rem;
}
.drink-btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 10px; padding: 10px 12px;
  text-align: left; cursor: pointer;
  font-size: 13px; color: #fff; transition: all 0.2s;
}
.drink-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.04); }
.drink-btn.selected { border: 2px solid #fff; background: rgba(255,255,255,0.28); font-weight: 600; }
.drink-num { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 2px; }

#beber-btn {
  display: block; width: 100%; padding: 14px;
  font-size: 16px; font-weight: 700;
  border-radius: 12px; cursor: pointer;
  background: rgba(255,255,255,0.12); color: #fff;
  border: 1px solid rgba(255,255,255,0.28);
  letter-spacing: 1px; transition: all 0.3s; margin-bottom: 1.5rem;
}
#beber-btn:hover { background: rgba(255,255,255,0.28); transform: scale(1.01); }
#beber-btn:active { transform: scale(0.98); }

#result-box {
  display: none;
  border-radius: 14px;
  padding: 1.2rem 1.4rem;
  text-align: center;
  position: relative; z-index: 30;
}
#result-label {
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
}
#result-text { font-size: 15px; line-height: 1.7; }

#reset-btn {
  display: none; margin: 1rem auto 0;
  padding: 8px 22px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.28);
  background: rgba(255,255,255,0.08); color: #fff;
  cursor: pointer; font-size: 13px; transition: background 0.2s;
}
#reset-btn:hover { background: rgba(255,255,255,0.22); }

/* ---- keyframes ---- */
@keyframes rainbow-text {
  0%   { color: #ff4444; } 16%  { color: #ff9900; }
  33%  { color: #ffee00; } 50%  { color: #33dd55; }
  66%  { color: #4488ff; } 83%  { color: #cc44ff; } 100% { color: #ff4444; }
}
@keyframes float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(2deg); }
}
@keyframes psycho-text {
  0%   { color: #ff003c; text-shadow: 2px 2px 0 lime; }
  33%  { color: #00ff88; text-shadow: -2px -2px 0 #ff00ff; }
  66%  { color: #ff00ff; text-shadow: 3px -3px 0 yellow; }
  100% { color: #ff003c; text-shadow: 2px 2px 0 lime; }
}
@keyframes shake {
  0%,100% { transform: translate(0,0) rotate(0deg); }
  20% { transform: translate(-4px,3px) rotate(-1deg); }
  40% { transform: translate(4px,-3px) rotate(1deg); }
  60% { transform: translate(-3px,-2px) rotate(0.6deg); }
  80% { transform: translate(3px,2px) rotate(-0.6deg); }
}
@keyframes skull-slide-in {
  from { transform: translateY(200px) rotate(15deg); opacity: 0; }
  to   { transform: translateY(0) rotate(0deg); opacity: 1; }
}
@keyframes skull-wobble {
  0%,100% { transform: translateY(0) rotate(-6deg); }
  50%     { transform: translateY(-8px) rotate(6deg); }
}
@keyframes slime-drip {
  from { transform: translateY(-100%); }
  to   { transform: translateY(0); }
}

.rainbow-mode h1 { animation: rainbow-text 1.5s infinite, float 3s infinite; }
.psycho-mode h1  { animation: psycho-text 0.5s infinite, shake 0.3s infinite; }
.psycho-mode .drink-btn { animation: shake 0.7s infinite; }
</style>
</head>

<div class="app">
  <h1 id="titulo">Roleta das Bebidas</h1>
  <p class="sub">Escolha sua bebida e descubra seu destino esta noite.</p>
  <div class="grid" id="drink-grid"></div>
  <button id="beber-btn" onclick="beber()">Tomar Bebida</button>
  <div id="result-box">
    <div id="result-label"></div>
    <div id="result-text"></div>
  </div>
  <button id="reset-btn" onclick="resetar()">Tentar novamente</button>
</div>

<script>
const bebidas = ['Skol','Skol Puro Malte','Itaipava','Rum','Pitu','Gostosa','Montila','Brahma','Heineken','Cerveja Local'];
const mortes = [
  "Parabens! Seu figado pediu arrego e virou uma pedra de cirrose.",
  "Voce arrumou uma briga de facada apos um debate acalorado sobre politica de bar e passou desta para uma melhor.",
  "A bebida tinha metanol. Voce ficou cego, depois surdo e agora esta morto.",
  "Voce entrou em coma alcoolico e seu cerebro deu Alt+F4.",
  "A gravidade venceu: voce caiu de cara no chao, dormiu na propria poca e acabou se afogando nela.",
  "Voce achou que era o Homem-Aranha, tentou descer as escadas correndo e quebrou o pescoco.",
  "Voce pegou o carro achando que era o Velozes e Furiosos, bateu num poste e virou saudade.",
  "A dor de cabeca da ressaca foi tao violenta que sua alma decidiu vazar do corpo por puro desgosto."
];

let selecionado = null, animFrame = null, mode = 'neutral', t = 0;
let particles = [], blobs = [];

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const body = document.body;
const skullWrap = document.getElementById('skull-wrap');
const slimeWrap = document.getElementById('slime-wrap');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// grid
const grid = document.getElementById('drink-grid');
bebidas.forEach((b, i) => {
  const btn = document.createElement('button');
  btn.className = 'drink-btn';
  btn.innerHTML = '<div class="drink-num">#' + i + '</div>' + b;
  btn.onclick = () => {
    document.querySelectorAll('.drink-btn').forEach(el => el.classList.remove('selected'));
    btn.classList.add('selected');
    selecionado = i;
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'none';
  };
  grid.appendChild(btn);
});

function stop() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// rainbow
function initRainbow() {
  particles = [];
  for (let i = 0; i < 70; i++) particles.push({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    r: Math.random()*20+6, hue: Math.random()*360,
    dx: (Math.random()-0.5)*1.5, dy: -(Math.random()*2+0.5),
    alpha: Math.random()*0.6+0.3
  });
}
function drawRainbow() {
  t += 0.018; ctx.clearRect(0,0,canvas.width,canvas.height);
  const g = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
  for (let i=0;i<=6;i++) g.addColorStop(i/6,'hsl('+((t*25*1+i*60)%360)+',75%,75%)');
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
  for (let i=0;i<7;i++) {
    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height+80, 200+i*35, Math.PI, 0);
    ctx.strokeStyle='hsla('+((i*50+t*35)%360)+',100%,55%,0.7)';
    ctx.lineWidth=22; ctx.stroke();
  }
  particles.forEach(p => {
    p.hue=(p.hue+2)%360; p.x+=p.dx; p.y+=p.dy;
    if(p.y<-20){p.y=canvas.height+20;p.x=Math.random()*canvas.width;}
    if(p.x<-20||p.x>canvas.width+20) p.dx*=-1;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='hsla('+p.hue+',90%,70%,'+p.alpha+')'; ctx.fill();
  });
  animFrame = requestAnimationFrame(drawRainbow);
}

// psycho
function initPsycho() {
  blobs = [];
  for (let i=0;i<14;i++) blobs.push({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    r:Math.random()*90+40, hue:Math.floor(Math.random()*6)*60,
    dx:(Math.random()-0.5)*3, dy:(Math.random()-0.5)*3,
    pulse:Math.random()*Math.PI*2
  });
}
function drawPsycho() {
  t+=0.045; ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='hsl('+((t*50)%360)+',25%,5%)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  blobs.forEach(p => {
    p.pulse+=0.07; p.x+=p.dx; p.y+=p.dy; p.hue=(p.hue+3)%360;
    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
    const pr=p.r+Math.sin(p.pulse)*22;
    const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,pr);
    gr.addColorStop(0,'hsla('+p.hue+',100%,55%,0.9)');
    gr.addColorStop(1,'hsla('+((p.hue+180)%360)+',100%,20%,0)');
    ctx.beginPath(); ctx.arc(p.x,p.y,pr,0,Math.PI*2);
    ctx.fillStyle=gr; ctx.fill();
  });
  const cx=canvas.width/2, cy=canvas.height/2;
  for(let i=0;i<10;i++){
    const a=t+i*Math.PI/5, len=90+Math.sin(t*2+i)*40;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*len, cy+Math.sin(a)*len);
    ctx.strokeStyle='hsla('+((i*36+t*90)%360)+',100%,65%,0.7)';
    ctx.lineWidth=3; ctx.stroke();
  }
  animFrame = requestAnimationFrame(drawPsycho);
}

function showSkullAndSlime() {
  // slime from top
  slimeWrap.style.display = 'block';
  slimeWrap.style.transform = 'translateY(-100%)';
  void slimeWrap.offsetWidth;
  slimeWrap.classList.add('show');

  // skull bottom-right after short delay
  setTimeout(() => {
    skullWrap.style.display = 'block';
    skullWrap.classList.add('show');
    setTimeout(() => {
      skullWrap.classList.remove('show');
      skullWrap.style.transform = 'translateY(0) rotate(0deg)';
      skullWrap.style.opacity = '1';
      skullWrap.classList.add('wobble');
    }, 950);
  }, 400);
}

function setRainbow(msg) {
  stop();
  body.classList.remove('psycho-mode'); body.classList.add('rainbow-mode');
  skullWrap.style.display='none'; slimeWrap.style.display='none';
  slimeWrap.classList.remove('show'); skullWrap.classList.remove('show','wobble');

  const rb = document.getElementById('result-box');
  rb.style.cssText = 'display:block;background:rgba(255,255,255,0.8);border:2px solid white;backdrop-filter:blur(8px);';
  document.getElementById('result-label').style.cssText = 'color:#145a00;';
  document.getElementById('result-label').textContent = 'SOBREVIVEU!';
  document.getElementById('result-text').style.cssText = 'color:#145a00;font-weight:500;';
  document.getElementById('result-text').textContent = msg;
  initRainbow(); drawRainbow(); mode='rainbow';
}

function setPsycho(msg) {
  stop();
  body.classList.remove('rainbow-mode'); body.classList.add('psycho-mode');

  const rb = document.getElementById('result-box');
  rb.style.cssText = 'display:block;background:rgba(0,0,0,0.85);border:2px solid #ff003c;backdrop-filter:blur(6px);margin-bottom:0.5rem;';
  document.getElementById('result-label').style.cssText = 'color:#ff003c;animation:psycho-text 0.4s infinite;';
  document.getElementById('result-label').textContent = 'VOCE MORREU';
  document.getElementById('result-text').style.cssText = 'color:#ff8800;animation:psycho-text 0.7s infinite;';
  document.getElementById('result-text').textContent = msg;

  showSkullAndSlime();
  initPsycho(); drawPsycho(); mode='psycho';
}

function beber() {
  if(selecionado===null){alert('Escolha uma bebida primeiro!');return;}
  const escolha = bebidas[selecionado];
  document.getElementById('reset-btn').style.display = 'block';
  if(Math.random()*100 < 50) setRainbow('Boa bebida! Curta muito seu(a) '+escolha.toUpperCase()+'!');
  else setPsycho(mortes[Math.floor(Math.random()*mortes.length)]);
}

function resetar() {
  stop();
  body.classList.remove('rainbow-mode','psycho-mode');
  skullWrap.style.display='none'; slimeWrap.style.display='none';
  slimeWrap.classList.remove('show');
  skullWrap.classList.remove('show','wobble');
  skullWrap.style.transform=''; skullWrap.style.opacity='';
  document.querySelectorAll('.drink-btn').forEach(b=>b.classList.remove('selected'));
  selecionado=null; mode='neutral'; t=0;
  document.getElementById('result-box').style.cssText='display:none;';
  document.getElementById('result-label').style.cssText='';
  document.getElementById('result-text').style.cssText='';
  document.getElementById('reset-btn').style.display='none';
}
</script>
</body>
</html>
